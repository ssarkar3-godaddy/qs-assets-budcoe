<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickSight Feedback Button</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Roboto, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    .feedback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
      color: #ffffff;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px; /* Modern square-round hybrid style */
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
      text-decoration: none;
      transition: all 0.15s ease-in-out;
      width: 90%;
      text-align: center;
      box-sizing: border-box;
    }
    .feedback-btn:hover {
      background: linear-gradient(135deg, #0369a1 0%, #075985 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(2, 132, 199, 0.3);
    }
    .icon { width: 16px; height: 16px; fill: currentColor; }
  </style>
</head>
<body>

  <!-- ALWAYS keep target="_blank" so the link opens outside your QuickSight frame -->
  <a href="https://YOUR_FEEDBACK_FORM_URL" target="_blank" class="feedback-btn">
    <svg class="icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
    Submit Feedback
  </a>

</body>
</html>
